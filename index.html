  <title>強固點餐 v1.13 店名電話版</title>
  <style>
    :root {
      --bg: #070604;
      --bg2: #11100c;
      --card: rgba(22, 19, 13, 0.96);
      --card2: rgba(31, 26, 16, 0.96);
      --ink: #f7e7b4;
      --ink-strong: #fff3c8;
      --muted: #b69a5b;
      --line: rgba(218, 181, 82, 0.26);
      --line-strong: rgba(238, 204, 118, 0.42);
      --soft: rgba(255, 224, 138, 0.07);
      --primary: #d6ad45;
      --primary-deep: #7a5517;
      --danger: #ff8a80;
      --danger-soft: rgba(126, 35, 28, 0.52);
      --ok: #c7f2a2;
      --ok-soft: rgba(58, 92, 39, 0.58);
      --btn: rgba(255, 218, 122, 0.12);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.38);
      --gold-gradient: linear-gradient(135deg, #fff1b8 0%, #d5aa3f 38%, #8c631d 100%);
      --calligraphy-font: "BiauKai", "DFKai-SB", "Kaiti TC", "KaiTi", "STKaiti", "Songti TC", "Noto Serif CJK TC", "Noto Serif TC", cursive, serif;
      --dark-gradient: linear-gradient(160deg, #1d180e 0%, #0d0b07 58%, #050403 100%);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at 12% 0%, rgba(217, 178, 74, 0.18), transparent 32%),
        radial-gradient(circle at 88% 12%, rgba(152, 106, 31, 0.15), transparent 30%),
        linear-gradient(180deg, #0b0905 0%, #050403 100%);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      padding: 12px 10px 18px;
    }

    button, input, textarea { font: inherit; }

    button {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--btn);
      color: var(--ink-strong);
      min-height: 40px;
      padding: 8px 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      box-shadow: inset 0 1px 0 rgba(255, 239, 184, 0.08);
    }

    button:active { transform: translateY(1px); }

    input, textarea {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(7, 6, 4, 0.74);
      color: var(--ink-strong);
      outline: none;
      caret-color: #ffd978;
    }

    input::placeholder, textarea::placeholder { color: rgba(214, 178, 92, 0.48); }

    input:focus, textarea:focus {
      border-color: #e4bf65;
      box-shadow: 0 0 0 3px rgba(214, 173, 69, 0.18);
    }

    .app { width: min(100%, 460px); margin: 0 auto; }

    .top-card {
      position: relative;
      overflow: hidden;
      background: var(--dark-gradient);
      color: var(--ink-strong);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      padding: 12px 12px 11px;
      box-shadow: var(--shadow);
    }

    .top-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(255,255,255,0.10), transparent 24%, transparent 76%, rgba(255,213,105,0.08)),
        repeating-linear-gradient(135deg, rgba(255, 219, 124, 0.045) 0, rgba(255, 219, 124, 0.045) 1px, transparent 1px, transparent 12px);
      pointer-events: none;
    }

    .top-card > * { position: relative; z-index: 1; }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .brand-group {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .app-icon-mini {
      display: block;
      flex: 0 0 auto;
      width: 54px;
      height: 54px;
      border-radius: 14px;
      border: 1px solid rgba(238, 204, 118, 0.46);
      box-shadow: 0 8px 18px rgba(0,0,0,0.36), inset 0 1px 0 rgba(255,255,255,0.14);
      object-fit: cover;
      overflow: hidden;
      background: #070604;
    }

    .brand-text { min-width: 0; }

    .shop-meta-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 5px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 23px;
      line-height: 1.12;
      letter-spacing: 0.04em;
      color: #ffe9a6;
      text-shadow: 0 1px 0 rgba(0,0,0,0.55);
      white-space: nowrap;
    }

    .shop-name, .shop-phone {
      display: inline-block;
      max-width: 150px;
      padding: 4px 8px;
      border: 1px solid rgba(238, 204, 118, 0.40);
      border-radius: 999px;
      background: rgba(255, 224, 138, 0.10);
      color: #fff1bd;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    .shop-phone {
      max-width: 130px;
      color: rgba(255, 234, 174, 0.88);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .title-actions {
      display: grid;
      justify-items: end;
      gap: 4px;
      flex: 0 0 auto;
    }

    .edit-shop-btn {
      min-height: 30px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      background: rgba(255, 218, 122, 0.13);
      color: #ffe7a0;
      border-color: rgba(238, 204, 118, 0.34);
      white-space: nowrap;
    }

    .version { font-size: 12px; color: rgba(255, 234, 174, 0.72); white-space: nowrap; }
    .subtitle { margin-top: 8px; font-size: 13px; color: rgba(255, 234, 174, 0.72); }

    .toolbar { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }

    .toolbar button {
      background: linear-gradient(180deg, rgba(255, 228, 152, 0.16), rgba(136, 94, 26, 0.20));
      border-color: var(--line-strong);
      box-shadow: var(--shadow);
      font-weight: 800;
    }

    .toolbar .setting-on {
      background: var(--gold-gradient);
      color: #1b1306;
      border-color: rgba(255, 238, 177, 0.68);
    }

    .list-card, .backup-card, .note-card, .total-card, .modal-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .header-row, .item-row, .edit-row { display: grid; align-items: center; column-gap: 6px; }

    .header-row {
      grid-template-columns: minmax(0, 1fr) 48px 112px;
      padding: 9px 10px;
      background: var(--soft);
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .item-row {
      grid-template-columns: minmax(0, 1fr) 48px 112px;
      min-height: 48px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--line);
    }

    .item-row:nth-child(even) { background: rgba(255, 216, 117, 0.035); }
    .item-row:last-child, .edit-row:last-child { border-bottom: 0; }

    .name {
      font-family: var(--calligraphy-font);
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.03em;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      color: #fff4c9;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.72), 0 0 9px rgba(214, 173, 69, 0.16);
    }

    .edit-name, #newName { font-family: var(--calligraphy-font); font-weight: 900; letter-spacing: 0.03em; }

    .price {
      text-align: right;
      font-size: 15px;
      font-variant-numeric: tabular-nums;
      color: #ffd778;
      padding-right: 2px;
      font-weight: 800;
    }

    .qty-control {
      display: grid;
      grid-template-columns: 34px 36px 34px;
      align-items: center;
      justify-content: end;
      gap: 4px;
    }

    .qty-btn {
      width: 34px;
      min-height: 36px;
      padding: 0;
      border-radius: 10px;
      background: linear-gradient(180deg, #f6d87b, #a87520);
      border: 1px solid rgba(255, 238, 178, 0.34);
      color: #1b1306;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 3px 10px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.34);
    }

    .qty-num { text-align: center; font-size: 18px; font-weight: 900; font-variant-numeric: tabular-nums; color: #fff0bb; }
    .empty { padding: 22px 14px; text-align: center; color: var(--muted); font-size: 14px; }

    .edit-row { grid-template-columns: minmax(0, 1fr) 58px 58px; min-height: 52px; padding: 7px 8px; border-bottom: 1px solid var(--line); }
    .edit-row input { width: 100%; height: 38px; padding: 6px 8px; font-size: 15px; }
    .edit-price { text-align: right; font-variant-numeric: tabular-nums; }

    .delete-btn {
      min-height: 38px;
      padding: 6px 8px;
      background: var(--danger-soft);
      color: #ffd2cd;
      border-color: rgba(255, 138, 128, 0.38);
      font-weight: 900;
      border-radius: 10px;
    }

    .backup-card, .note-card, .total-card { margin-top: 10px; }
    .backup-card, .note-card { padding: 10px; }

    .backup-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .backup-btn { font-weight: 900; background: linear-gradient(180deg, rgba(255, 228, 152, 0.14), rgba(136, 94, 26, 0.24)); border-color: rgba(238, 204, 118, 0.34); }
    .read-backup-btn { background: linear-gradient(180deg, rgba(199, 242, 162, 0.13), rgba(58, 92, 39, 0.42)); color: #eaffd8; border-color: rgba(199, 242, 162, 0.28); }
    .hidden-file-input { display: none; }

    .section-title { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 14px; font-weight: 900; color: #ffe7a0; }
    .hint { color: var(--muted); font-size: 12px; font-weight: 600; }

    textarea { width: 100%; min-height: 74px; resize: vertical; padding: 9px 10px; line-height: 1.45; font-size: 15px; }

    .total-card { padding: 12px 12px 14px; }
    .total-line { display: grid; grid-template-columns: 1fr 1fr; align-items: stretch; gap: 10px; padding-bottom: 9px; border-bottom: 1px solid var(--line); }
    .total-metric { min-width: 0; padding: 8px 9px; border: 1px solid rgba(218, 181, 82, 0.18); border-radius: 12px; background: rgba(255, 224, 138, 0.055); }
    .total-metric.amount-metric { text-align: right; }
    .total-label { color: var(--muted); font-size: 13px; font-weight: 800; }
    .total-value { margin-top: 2px; font-size: 24px; font-weight: 950; font-variant-numeric: tabular-nums; color: #ffe39a; text-shadow: 0 0 14px rgba(214, 173, 69, 0.16); white-space: nowrap; }
    .total-value.qty-total { color: #fff0bb; }

    .selected-summary { margin-top: 10px; padding: 9px 10px 10px; border: 1px solid rgba(218, 181, 82, 0.18); border-radius: 12px; background: rgba(255, 224, 138, 0.045); }
    .selected-summary-title { color: var(--muted); font-size: 13px; font-weight: 900; letter-spacing: 0.03em; }
    .selected-summary-list { margin-top: 5px; color: #fff0bb; font-size: 16px; font-weight: 900; line-height: 1.6; word-break: keep-all; overflow-wrap: anywhere; }
    .selected-summary-list.empty { color: var(--muted); font-size: 14px; font-weight: 700; }

    .status { margin-top: 8px; min-height: 18px; color: var(--muted); font-size: 12px; }
    .bottom-actions { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 10px; }
    .save-btn { background: linear-gradient(180deg, rgba(199, 242, 162, 0.18), rgba(58, 92, 39, 0.62)); color: #e5ffd0; border-color: rgba(199, 242, 162, 0.34); font-weight: 900; }
    .reset-btn { background: linear-gradient(180deg, rgba(255, 138, 128, 0.16), rgba(126, 35, 28, 0.62)); color: #ffd7d2; border-color: rgba(255, 138, 128, 0.38); font-weight: 900; }

    .modal-backdrop { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.68); padding: 16px; z-index: 30; }
    .modal-backdrop.show { display: flex; }
    .modal-card { width: min(100%, 420px); padding: 14px; animation: pop 120ms ease-out; }
    @keyframes pop { from { transform: scale(0.98); opacity: 0.75; } to { transform: scale(1); opacity: 1; } }
    .modal-card h2 { margin: 0 0 10px; font-size: 18px; color: #ffe7a0; }
    .field { margin-top: 10px; }
    .field label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 900; color: #d9bd78; }
    .field input { width: 100%; height: 42px; padding: 8px 10px; font-size: 16px; }
    .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
    .primary-btn { background: var(--gold-gradient); color: #1b1306; border-color: rgba(255, 238, 177, 0.68); font-weight: 950; }
    .cancel-btn { background: rgba(255, 218, 122, 0.11); color: var(--ink); font-weight: 900; }
    .message { min-height: 20px; margin-top: 8px; color: #ffaaa2; font-size: 13px; font-weight: 800; }
    .confirm-text { color: var(--ink); line-height: 1.55; font-size: 14px; }
    .confirm-text strong { color: #ffaaa2; }

    @media (max-width: 370px) {
      body { padding-left: 6px; padding-right: 6px; }
      .title-row { align-items: flex-start; }
      .brand-group { grid-template-columns: 48px minmax(0, 1fr); gap: 8px; }
      .app-icon-mini { width: 48px; height: 48px; border-radius: 12px; }
      h1 { font-size: 20px; }
      .shop-meta-row { gap: 4px; }
      .shop-name { max-width: 108px; font-size: 13px; }
      .shop-phone { max-width: 102px; font-size: 11px; padding-left: 6px; padding-right: 6px; }
      .edit-shop-btn { min-height: 28px; padding: 3px 7px; font-size: 11px; }
      .header-row, .item-row { grid-template-columns: minmax(0, 1fr) 42px 104px; }
      .qty-control { grid-template-columns: 32px 32px 32px; gap: 4px; }
      .qty-btn { width: 32px; }
      .name { font-size: 16px; letter-spacing: 0.01em; }
      .price { font-size: 14px; }
      .backup-actions { grid-template-columns: 1fr; }
    }
  </style>
</head>

      <div class="field"><label for="newName">品名，最多 7 字</label><input id="newName" maxlength="7" autocomplete="off" placeholder="炸雞腿飯" /></div>
      <div class="field"><label for="newPrice">價格，1～999</label><input id="newPrice" inputmode="numeric" autocomplete="off" placeholder="130" /></div>
      <div class="field"><label for="newQty">初始數量，0～99</label><input id="newQty" inputmode="numeric" autocomplete="off" placeholder="0" value="0" /></div>
      <div id="itemMsg" class="message"></div>
      <div class="modal-actions"><button id="cancelAddBtn" class="cancel-btn" type="button">取消</button><button id="confirmAddBtn" class="primary-btn" type="button">新增</button></div>
    </div>
  </div>

  <div id="shopModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="shopModalTitle">
    <div class="modal-card">
      <h2 id="shopModalTitle">編輯店名與電話</h2>
      <div class="field"><label for="shopNameInput">店名，最多 12 字</label><input id="shopNameInput" maxlength="12" autocomplete="off" placeholder="甲一飯包" /></div>
      <div class="field"><label for="shopPhoneInput">電話號碼</label><input id="shopPhoneInput" inputmode="tel" maxlength="20" autocomplete="tel" placeholder="065890222" /></div>
      <div id="shopMsg" class="message"></div>
      <div class="modal-actions"><button id="cancelShopBtn" class="cancel-btn" type="button">取消</button><button id="confirmShopBtn" class="primary-btn" type="button">儲存資料</button></div>
    </div>
  </div>

  <div id="resetModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="resetModalTitle">
    <div class="modal-card">
      <h2 id="resetModalTitle">確認歸零</h2>
      <div class="confirm-text">確定要把今天數量全部歸零？<br />此動作會把 <strong>所有數量改成 0</strong>，並且 <strong>清空備註</strong>。</div>
      <div class="modal-actions"><button id="cancelResetBtn" class="cancel-btn" type="button">取消</button><button id="confirmResetBtn" class="reset-btn" type="button">確定歸零</button></div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      const STORAGE_KEY = 'simple-order-app-v1-data';
      const APP_NAME = '強固點餐';
      const APP_VERSION = '1.13';
      const DEFAULT_DATA = {
        storeName: '甲一飯包',
        storePhone: '065890222',
        items: [
          { id: makeId(), name: '炸雞腿飯', price: 130, qty: 0 },
          { id: makeId(), name: '香雞排飯', price: 110, qty: 0 },
          { id: makeId(), name: '挪威鯖魚飯', price: 130, qty: 0 },
          { id: makeId(), name: '黑胡椒牛柳飯', price: 110, qty: 0 },
          { id: makeId(), name: '菲力豬排飯', price: 105, qty: 0 },
          { id: makeId(), name: '塔香無骨雞排飯', price: 105, qty: 0 },
          { id: makeId(), name: '爌肉飯', price: 100, qty: 0 },
          { id: makeId(), name: '法式豬排飯', price: 100, qty: 0 },
          { id: makeId(), name: '叉燒飯', price: 95, qty: 0 },
          { id: makeId(), name: '養生飯', price: 95, qty: 0 },
          { id: makeId(), name: '炸排骨飯', price: 95, qty: 0 },
          { id: makeId(), name: '蒲燒魚飯', price: 95, qty: 0 },
          { id: makeId(), name: '鐵路排骨飯', price: 95, qty: 0 },
          { id: makeId(), name: '招牌飯', price: 90, qty: 0 },
          { id: makeId(), name: '滷棒腿飯', price: 90, qty: 0 },
          { id: makeId(), name: '薄鹽鯖魚飯', price: 100, qty: 0 },
          { id: makeId(), name: '香腸飯', price: 85, qty: 0 },
          { id: makeId(), name: '原味卡啦雞飯', price: 85, qty: 0 },
          { id: makeId(), name: '辣味卡啦雞飯', price: 85, qty: 0 }
        ],
        note: '',
        lastSavedAt: ''
      };

      let state = loadState();
      let settingMode = false;

      const els = {
        shopNameText: document.getElementById('shopNameText'),
        storePhoneText: document.getElementById('storePhoneText'),
        editShopBtn: document.getElementById('editShopBtn'),
        addBtn: document.getElementById('addBtn'),
        settingBtn: document.getElementById('settingBtn'),
        exportMenuBtn: document.getElementById('exportMenuBtn'),
        importMenuBtn: document.getElementById('importMenuBtn'),
        importFile: document.getElementById('importFile'),
        listBody: document.getElementById('listBody'),
        noteInput: document.getElementById('noteInput'),
        totalQty: document.getElementById('totalQty'),
        totalAmount: document.getElementById('totalAmount'),
        selectedSummary: document.getElementById('selectedSummary'),
        saveStatus: document.getElementById('saveStatus'),
        saveBtn: document.getElementById('saveBtn'),
        resetBtn: document.getElementById('resetBtn'),
        itemModal: document.getElementById('itemModal'),
        newName: document.getElementById('newName'),
        newPrice: document.getElementById('newPrice'),
        newQty: document.getElementById('newQty'),
        itemMsg: document.getElementById('itemMsg'),
        cancelAddBtn: document.getElementById('cancelAddBtn'),
        confirmAddBtn: document.getElementById('confirmAddBtn'),
        shopModal: document.getElementById('shopModal'),
        shopNameInput: document.getElementById('shopNameInput'),
        shopPhoneInput: document.getElementById('shopPhoneInput'),
        shopMsg: document.getElementById('shopMsg'),
        cancelShopBtn: document.getElementById('cancelShopBtn'),
        confirmShopBtn: document.getElementById('confirmShopBtn'),
        resetModal: document.getElementById('resetModal'),
        cancelResetBtn: document.getElementById('cancelResetBtn'),
        confirmResetBtn: document.getElementById('confirmResetBtn')
      };

      els.editShopBtn.addEventListener('click', openShopModal);
      els.addBtn.addEventListener('click', openAddModal);
      els.settingBtn.addEventListener('click', toggleSettingMode);
      els.exportMenuBtn.addEventListener('click', exportMenuBackup);
      els.importMenuBtn.addEventListener('click', openImportMenuBackup);
      els.importFile.addEventListener('change', importMenuBackup);
      els.noteInput.addEventListener('input', function () { state.note = els.noteInput.value; autoSave('備註已自動儲存'); });
      els.saveBtn.addEventListener('click', function () { manualSave('已手動儲存 ' + timeText()); });
      els.resetBtn.addEventListener('click', function () { els.resetModal.classList.add('show'); });
      els.cancelResetBtn.addEventListener('click', closeResetModal);
      els.confirmResetBtn.addEventListener('click', resetAllQty);
      els.cancelAddBtn.addEventListener('click', closeAddModal);
      els.confirmAddBtn.addEventListener('click', addItem);
      els.cancelShopBtn.addEventListener('click', closeShopModal);
      els.confirmShopBtn.addEventListener('click', saveShopName);

      els.itemModal.addEventListener('click', function (event) { if (event.target === els.itemModal) closeAddModal(); });
      els.shopModal.addEventListener('click', function (event) { if (event.target === els.shopModal) closeShopModal(); });
      els.resetModal.addEventListener('click', function (event) { if (event.target === els.resetModal) closeResetModal(); });
      document.addEventListener('keydown', function (event) { if (event.key === 'Escape') { closeAddModal(); closeShopModal(); closeResetModal(); } });

      render();

      function makeId() { return 'item-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8); }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return clone(DEFAULT_DATA);
          const parsed = JSON.parse(raw);
          const items = Array.isArray(parsed.items) ? parsed.items : [];
          const normalized = items.map(normalizeItem).filter(Boolean);
          return {
            storeName: normalizeStoreName(parsed.storeName),
            storePhone: normalizeStorePhone(parsed.storePhone),
            items: normalized.length ? normalized : clone(DEFAULT_DATA.items),
            note: typeof parsed.note === 'string' ? parsed.note : '',
            lastSavedAt: typeof parsed.lastSavedAt === 'string' ? parsed.lastSavedAt : ''
          };
        } catch (error) {
          return clone(DEFAULT_DATA);
        }
      }

      function clone(value) { return JSON.parse(JSON.stringify(value)); }

      function normalizeStoreName(value) {
        const name = typeof value === 'string' ? value.trim().slice(0, 12) : '';
        return name || DEFAULT_DATA.storeName;
      }

      function normalizeStorePhone(value) {
        const phone = typeof value === 'string' ? value.replace(/[^0-9+#()-]/g, '').slice(0, 20) : '';
        return phone || DEFAULT_DATA.storePhone;
      }

      function normalizeItem(item) {
        if (!item || typeof item !== 'object') return null;
        const name = String(item.name || '').trim().slice(0, 7);
        const price = clampInt(item.price, 1, 999, 0);
        const qty = clampInt(item.qty, 0, 99, 0);
        if (!name || price < 1) return null;
        return { id: item.id || makeId(), name: name, price: price, qty: qty };
      }

      function clampInt(value, min, max, fallback) {
        const n = parseInt(String(value).replace(/[^0-9]/g, ''), 10);
        if (!Number.isFinite(n)) return fallback;
        return Math.max(min, Math.min(max, n));
      }

      function esc(value) {
        return String(value).replace(/[&<>"]/g, function (ch) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch];
        });
      }

      function render() {
        els.shopNameText.textContent = state.storeName;
        els.shopNameText.title = state.storeName;
        els.storePhoneText.textContent = '電話 ' + state.storePhone;
        els.storePhoneText.title = '電話 ' + state.storePhone;
        els.noteInput.value = state.note;
        els.settingBtn.textContent = settingMode ? '完成設定' : '設定';
        els.settingBtn.classList.toggle('setting-on', settingMode);
        renderList();
        renderTotal();
        setStatus(state.lastSavedAt || '尚未儲存');
      }

      function renderList() {
        if (!state.items.length) {
          els.listBody.innerHTML = '<div class="empty">目前沒有品項，請先新增。</div>';
          return;
        }
        els.listBody.innerHTML = state.items.map(function (item) {
          if (settingMode) {
            return '<div class="edit-row" data-id="' + esc(item.id) + '">' +
              '<input class="edit-name" maxlength="7" value="' + esc(item.name) + '" aria-label="品名" />' +
              '<input class="edit-price" inputmode="numeric" value="' + esc(item.price) + '" aria-label="價格" />' +
              '<button class="delete-btn" type="button">刪除</button>' +
              '</div>';
          }
          return '<div class="item-row" data-id="' + esc(item.id) + '">' +
            '<div class="name" title="' + esc(item.name) + '">' + esc(item.name) + '</div>' +
            '<div class="price">' + esc(item.price) + '</div>' +
            '<div class="qty-control">' +
              '<button class="qty-btn minus" type="button" aria-label="減少">−</button>' +
              '<div class="qty-num">' + esc(item.qty) + '</div>' +
              '<button class="qty-btn plus" type="button" aria-label="增加">＋</button>' +
            '</div>' +
            '</div>';
        }).join('');
        bindListEvents();
      }

      function bindListEvents() {
        els.listBody.querySelectorAll('.item-row').forEach(function (row) {
          const id = row.dataset.id;
          const item = findItem(id);
          if (!item) return;
          row.querySelector('.minus').addEventListener('click', function () { setQty(item, item.qty - 1); });
          row.querySelector('.plus').addEventListener('click', function () { setQty(item, item.qty + 1); });
        });

        els.listBody.querySelectorAll('.edit-row').forEach(function (row) {
          const id = row.dataset.id;
          const item = findItem(id);
          if (!item) return;
          const nameInput = row.querySelector('.edit-name');
          const priceInput = row.querySelector('.edit-price');
          const deleteBtn = row.querySelector('.delete-btn');
          nameInput.addEventListener('input', function () {
            item.name = String(nameInput.value || '').trim().slice(0, 7) || item.name;
            autoSave('品名已自動儲存');
          });
          priceInput.addEventListener('input', function () {
            item.price = clampInt(priceInput.value, 1, 999, item.price || 1);
            priceInput.value = item.price;
            autoSave('價格已自動儲存');
            renderTotal();
          });
          deleteBtn.addEventListener('click', function () {
            const ok = window.confirm('確定刪除「' + item.name + '」？');
            if (!ok) return;
            state.items = state.items.filter(function (x) { return x.id !== id; });
            manualSave('已刪除品項 ' + timeText());
          });
        });
      }

      function renderTotal() {
        const totalQty = state.items.reduce(function (sum, item) { return sum + item.qty; }, 0);
        const totalAmount = state.items.reduce(function (sum, item) { return sum + item.qty * item.price; }, 0);
        els.totalQty.textContent = totalQty;
        els.totalAmount.textContent = totalAmount;
        const selected = state.items.filter(function (item) { return item.qty > 0; });
        if (!selected.length) {
          els.selectedSummary.textContent = '尚未選擇品項';
          els.selectedSummary.classList.add('empty');
        } else {
          els.selectedSummary.textContent = selected.map(function (item) { return item.name + '×' + item.qty; }).join('、');
          els.selectedSummary.classList.remove('empty');
        }
      }

      function findItem(id) { return state.items.find(function (item) { return item.id === id; }); }

      function setQty(item, nextQty) {
        item.qty = Math.max(0, Math.min(99, nextQty));
        autoSave('數量已自動儲存');
        renderList();
        renderTotal();
      }

      function openAddModal() {
        els.newName.value = '';
        els.newPrice.value = '';
        els.newQty.value = '0';
        els.itemMsg.textContent = '';
        els.itemModal.classList.add('show');
        setTimeout(function () { els.newName.focus(); }, 60);
      }

      function closeAddModal() { els.itemModal.classList.remove('show'); }

      function addItem() {
        const name = String(els.newName.value || '').trim().slice(0, 7);
        const price = clampInt(els.newPrice.value, 1, 999, 0);
        const qty = clampInt(els.newQty.value, 0, 99, 0);
        if (!name) { els.itemMsg.textContent = '請輸入品名。'; return; }
        if (!price) { els.itemMsg.textContent = '請輸入 1～999 的價格。'; return; }
        state.items.push({ id: makeId(), name: name, price: price, qty: qty });
        closeAddModal();
        manualSave('已新增品項 ' + timeText());
      }

      function toggleSettingMode() { settingMode = !settingMode; render(); }

      function openShopModal() {
        els.shopNameInput.value = state.storeName;
        els.shopPhoneInput.value = state.storePhone;
        els.shopMsg.textContent = '';
        els.shopModal.classList.add('show');
        setTimeout(function () { els.shopNameInput.focus(); els.shopNameInput.select(); }, 60);
      }

      function closeShopModal() { els.shopModal.classList.remove('show'); }

      function saveShopName() {
        const name = normalizeStoreName(els.shopNameInput.value);
        const phone = normalizeStorePhone(els.shopPhoneInput.value);
        if (!name) { els.shopMsg.textContent = '請輸入店名。'; return; }
        if (!phone) { els.shopMsg.textContent = '請輸入電話號碼。'; return; }
        state.storeName = name;
        state.storePhone = phone;
        closeShopModal();
        manualSave('店名與電話已儲存 ' + timeText());
      }

      function autoSave(message) {
        state.lastSavedAt = message + ' ' + timeText();
        persist();
        setStatus(state.lastSavedAt);
      }

      function manualSave(message) {
        state.lastSavedAt = message;
        persist();
        render();
      }

      function persist() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

      function setStatus(text) { els.saveStatus.textContent = text; }

      function timeText() {
        const now = new Date();
        return String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
      }

      function exportMenuBackup() {
        const backup = {
          app: 'qianggu-order-app',
          type: 'menu-items-backup',
          version: APP_VERSION,
          appName: APP_NAME,
          exportedAt: new Date().toISOString(),
          storeName: normalizeStoreName(state.storeName),
          storePhone: normalizeStorePhone(state.storePhone),
          items: state.items.map(function (item) { return { name: item.name, price: item.price }; })
        };
        const json = JSON.stringify(backup, null, 2);
        const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = safeFileName(backup.storeName) + '_品項備份_' + dateStamp() + '.json';
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
        setStatus('品項備份已下載');
      }

      function openImportMenuBackup() { els.importFile.value = ''; els.importFile.click(); }

      function importMenuBackup(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function () {
          try {
            const parsed = JSON.parse(String(reader.result || ''));
            const backup = parseMenuBackup(parsed);
            if (backup.items.length === 0) {
              setStatus('備份檔沒有可讀取的品項');
              window.alert('備份檔沒有可讀取的品項。');
              return;
            }
            const ok = window.confirm('讀取品項備份會覆蓋目前菜單品項與價格，並把所有數量歸零。\n\n確定讀取「' + backup.storeName + '」的 ' + backup.items.length + ' 個品項？');
            if (!ok) return;
            state.storeName = backup.storeName;
            state.storePhone = backup.storePhone;
            state.items = backup.items.map(function (item) { return { id: makeId(), name: item.name, price: item.price, qty: 0 }; });
            state.note = '';
            manualSave('已讀取品項備份 ' + timeText());
          } catch (error) {
            setStatus('備份檔讀取失敗');
            window.alert('備份檔格式不正確，無法讀取。');
          }
        };
        reader.onerror = function () { setStatus('備份檔讀取失敗'); window.alert('備份檔讀取失敗。'); };
        reader.readAsText(file, 'utf-8');
      }

      function parseMenuBackup(parsed) {
        if (!parsed || typeof parsed !== 'object') throw new Error('Invalid backup');
        const rawItems = Array.isArray(parsed.items) ? parsed.items : [];
        const items = rawItems.map(function (item) {
          return normalizeItem({ id: makeId(), name: item && item.name, price: item && item.price, qty: 0 });
        }).filter(Boolean).map(function (item) { item.qty = 0; return item; });
        return { storeName: normalizeStoreName(parsed.storeName), storePhone: normalizeStorePhone(parsed.storePhone), items: items };
      }

      function safeFileName(value) {
        return String(value || '菜單').replace(/[\\/:*?"<>|\s]+/g, '_').replace(/^_+|_+$/g, '').slice(0, 24) || '菜單';
      }

      function dateStamp() {
        const now = new Date();
        return String(now.getFullYear()) + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0') + '_' + String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0');
      }

      function closeResetModal() { els.resetModal.classList.remove('show'); }

      function resetAllQty() {
        state.items.forEach(function (item) { item.qty = 0; });
        state.note = '';
        manualSave('已歸零 ' + timeText());
        closeResetModal();
      }
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./service-worker.js').catch(function () {});
      });
    }
  </script>
</body>
